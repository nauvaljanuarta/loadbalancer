# Batas memori max 64 MB
maxmemory 64mb
# Kebijakan eviction: hapus key yang paling jarang diakses (LFU)
maxmemory-policy allkeys-lfu
# Aktifkan lazy-free untuk background deletion
lazyfree-lazy-eviction yes
# Log level
loglevel notice
# Simpan snapshot tiap 60 detik jika ada >= 100 perubahan
save 60 100
# Data directory
dir /data
