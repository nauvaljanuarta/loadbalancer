events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=5s;

    upstream flask_apps {
        server app1:5000;            # Server UTAMA
        server app2:5000 backup;     # Backup 1 (aktif jika app1 down)
        server app3:5000 backup;     # Backup 2 (aktif jika app1 down)
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://flask_apps;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 2s;
            proxy_read_timeout 10s;
        }

        location /lb-health {
            return 200 '{"status": "load balancer healthy"}';
            add_header Content-Type application/json;
        }
    }
}