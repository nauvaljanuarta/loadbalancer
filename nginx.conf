events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=5s;

    # ══════════════════════════════════════════════════════
    #  SIMULASI CDN — Nginx Proxy Cache (Edge Cache)
    # ══════════════════════════════════════════════════════
    #  proxy_cache_path: menyimpan respons dari origin server
    #  di disk Nginx, sehingga request berikutnya TIDAK perlu
    #  meneruskan ke backend → mirip CDN edge node.
    # ──────────────────────────────────────────────────────
    proxy_cache_path /var/cache/nginx/cdn_cache
                     levels=1:2
                     keys_zone=cdn_cache:10m       # 10 MB metadata
                     max_size=100m                  # Max 100 MB cache di disk
                     inactive=60s                   # Hapus jika 60 detik tidak diakses
                     use_temp_path=off;

    upstream flask_apps {
        server app1:5000;            # Server UTAMA
        server app2:5000 backup;     # Backup 1 (aktif jika app1 down)
        server app3:5000 backup;     # Backup 2 (aktif jika app1 down)
    }

    server {
        listen 80;
        server_name localhost;

        # ── Default: Proxy ke backend (tanpa CDN cache) ──
        location / {
            proxy_pass http://flask_apps;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 2s;
            proxy_read_timeout 10s;
        }

        # ── /data → Proxy ke backend (Redis cache di app level) ──
        location /data {
            proxy_pass http://flask_apps;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 2s;
            proxy_read_timeout 30s;
        }

        # ══════════════════════════════════════════════════
        #  /static-asset → SIMULASI CDN EDGE CACHE
        #  Nginx meng-cache respons dari origin server,
        #  sehingga request kedua dst langsung dari Nginx
        #  tanpa meneruskan ke backend.
        # ══════════════════════════════════════════════════
        location /static-asset {
            proxy_pass http://flask_apps;

            # Aktifkan proxy cache (CDN edge)
            proxy_cache cdn_cache;
            proxy_cache_valid 200 60s;         # Cache respons 200 selama 60 detik
            proxy_cache_key "$request_uri";
            proxy_cache_use_stale error timeout updating;

            # Header untuk debugging: HIT / MISS / EXPIRED
            add_header X-Cache-Status $upstream_cache_status always;
            add_header X-CDN-Edge "nginx-cdn-sim" always;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 2s;
            proxy_read_timeout 10s;
        }

        # ── Cache Stats ──
        location /cache-stats {
            proxy_pass http://flask_apps;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_connect_timeout 2s;
            proxy_read_timeout 10s;
        }

        # ── Cache Flush ──
        location /cache-flush {
            proxy_pass http://flask_apps;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_connect_timeout 2s;
            proxy_read_timeout 10s;
        }

        # ── LB Health ──
        location /lb-health {
            return 200 '{"status": "load balancer healthy"}';
            add_header Content-Type application/json;
        }

        # ── CDN Cache Status (Nginx level) ──
        location /cdn-status {
            return 200 '{"cdn_engine": "nginx-proxy-cache", "cache_zone": "cdn_cache", "max_size": "100m", "ttl": "60s"}';
            add_header Content-Type application/json;
        }
    }
}