services:
  # ── Redis Caching Layer ───────────────────────────────
  redis:
    build: ./redis
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  app1:
    build: ./app1
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_TTL=30
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  app2:
    build: ./app2
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_TTL=30
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  app3:
    build: ./app3
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_TTL=30
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  # ── Nginx Load Balancer + CDN Simulation ──────────────
  loadbalancer:
    build: ./
    ports:
      - "80:80"
    depends_on:
      - app1
      - app2
      - app3
    networks:
      - app-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  # ── Autoscaler (Monitor CPU & Pindah Traffic) ────
  autoscaler:
    build: ./autoscaler
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - app1
      - app2
      - app3
      - loadbalancer
    environment:
      - CPU_THRESHOLD=70          # Pindah traffic jika CPU > 70%
      - CHECK_INTERVAL=10         # Cek setiap 10 detik
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
